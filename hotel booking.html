<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
background-image: url('https://img.freepik.com/free-photo/abstract-luxury-gradient-blue-background-smooth-dark-blue-with-black-vignette-studio-banner_1258-72292.jpg');
            background-size: cover;
            background-position: center;
            height: 100%;
            color: #333;
background-repeat: 2;
background-size: cover; /* Makes sure the background image covers the entire area */
        background-position: center; /* Centers the background image */
        height: 100%; /* Ensures the body takes the full height of the viewport */
            background-color: #f4f4f4;
            color: #333;


        }
        header {
            background: #007bff;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
        }
        nav {
            margin: 10px 0;
        }
        nav a {
            margin: 0 15px;
            color: #fff;
            text-decoration: none;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input[type="text"], input[type="date"], select {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        input[type="submit"] {
            background: #28a745;
            color: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
        .message {
            margin-top: 20px;
            color: #28a745;
        }
    </style>
    <script>
        function showMessage(event) {
            event.preventDefault(); // Prevent the form from submitting
            const messageDiv = document.getElementById("confirmationMessage");
            messageDiv.textContent = "Hotel Booking Submitted! Thank you.";
            messageDiv.style.display = "block";
        }
    </script>
</head>
<body>

<header>
    <h1>Hotel Booking</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about3.html">About Us</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact Us</a>
        <a href="review.html">Reviews</a>

    </nav>
</header>

<div class="container">
    <h2>Book Your Stay</h2>
    <form onsubmit="showMessage(event)">
        <input type="text" placeholder="Your Name" required>
        <input type="text" placeholder="Email" required>
        <input type="text" placeholder="Phone Number" required>
        <input type="date" placeholder="Check-in Date" required>
        <input type="date" placeholder="Check-out Date" required>
        <select required>
            <option value="">Number of Guests</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
        <input type="submit" value="Book Now">
    </form>
    <div id="confirmationMessage" class="message" style="display: none;"></div>
</div>

</body>
</html>
